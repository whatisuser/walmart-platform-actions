name: Provision New Microservice

on:
  workflow_dispatch:
    inputs:
      service_name:
        required: true
        type: string
      team_owner:
        required: true
        type: string
      environment:
        required: true
        type: string
      port_context:
        required: false
        type: string

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - name: Log Provisioning Request
        run: |
          echo "🚀 Provisioning new microservice"
          echo "Service: ${{ github.event.inputs.service_name }}"
          echo "Team: ${{ github.event.inputs.team_owner }}"
          echo "Environment: ${{ github.event.inputs.environment }}"

      - name: Create Kubernetes Namespace
        run: |
          echo "✅ Creating namespace: ${{ github.event.inputs.service_name }}"
          echo "✅ Applying RBAC policies for team: ${{ github.event.inputs.team_owner }}"

      - name: Scaffold Service Repository
        run: |
          echo "✅ Creating GitHub repository: ${{ github.event.inputs.service_name }}-service"
          echo "✅ Applying standard Walmart repository template"
          echo "✅ Configuring branch protection rules"

      - name: Create Jira Project
        run: |
          echo "✅ Creating Jira project for: ${{ github.event.inputs.service_name }}"
          echo "✅ Assigning to team: ${{ github.event.inputs.team_owner }}"

      - name: Register Service in Port
        run: |
          echo "✅ Registering ${{ github.event.inputs.service_name }} in Port catalog"
          echo "✅ Service provisioning complete!"

      - name: Report Success to Port
        if: always()
        run: |
          CONTEXT='${{ github.event.inputs.port_context }}'
          RUN_ID=$(echo $CONTEXT | python3 -c "import sys,json; print(json.load(sys.stdin).get('runId',''))" 2>/dev/null || echo "")
          if [ -n "$RUN_ID" ]; then
            TOKEN=$(curl -s -X POST 'https://api.port.io/v1/auth/access_token' \
              -H 'Content-Type: application/json' \
              -d '{"clientId":"${{ secrets.PORT_CLIENT_ID }}","clientSecret":"${{ secrets.PORT_CLIENT_SECRET }}"}' \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['accessToken'])")
            curl -s -X PATCH "https://api.port.io/v1/actions/runs/$RUN_ID" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"status":"SUCCESS","message":{"run_status":"Service provisioned successfully"}}'
          fi
